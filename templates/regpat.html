<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    /* Flash Message Styling */
    #flash-wrapper {
      position: fixed;
      top: 20px;
      left: 0;
      width: 100%;
      z-index: 1050;
      text-align: center;
      pointer-events: none;
    }

    .custom-flash {
  display: inline-block;
  margin: 10px auto;
  padding: 12px 24px;
  border-radius: 6px;
  font-weight: bold;
  color: white;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  animation: fadeout 4s forwards;
  pointer-events: auto;
}

.custom-flash.success {
  background-color: #28a745; /* Green */
}

.custom-flash.danger {
  background-color: #dc3545; /* Red */
}

.custom-flash.info {
  background-color: #17a2b8; /* Blue */
}


    @keyframes fadeout {
      0%   { opacity: 1; }
      80%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(-20px); }
    }

    /* Layout Styling */
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(rgba(255,255,255,0.5), rgba(255,255,255,0.5)),
                  url('https://images.pexels.com/photos/40568/medical-appointment-doctor-healthcare-40568.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=1080&w=1920') 
                  no-repeat center center/cover;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    #main-content {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
    }

    .form-container {
      width: 100%;
      max-width: 500px;
      padding: 30px 30px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #3657B5;
      font-weight: bold;
      font-size: 26px;
      text-shadow: 1px 1px 6px rgba(0, 0, 0, 0.1);
    }

    .form-label {
      font-weight: 500;
    }

    .form-control {
      border-radius: 8px;
      padding: 10px;
      transition: border 0.3s ease, box-shadow 0.3s ease;
    }

    .form-control:focus {
      border-color: #4169E1;
      box-shadow: 0 0 8px rgba(65, 105, 225, 0.3);
    }

    .btn-custom {
      background: linear-gradient(135deg, #4169E1, #3657B5);
      color: white;
      border-radius: 30px;
      padding: 12px;
      font-size: 1rem;
      width: 100%;
      transition: background-color 0.3s ease;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
    }

    .btn-custom:hover {
      background: linear-gradient(135deg, #3657B5, #293E8E);
    }

    .form-text {
      font-size: 0.85rem;
      color: #6c757d;
    }
  </style>
</head>
<body>

  <!-- Flash message floating above everything -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div id="flash-wrapper">
        {% for category, message in messages %}
          <div class="custom-flash {{ category }}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <!-- Main content starts here -->
  <div id="main-content">
    <div class="form-container">
      <h2><i class="fas fa-user-edit me-2"></i>Patient Registration</h2>
      <form action="/regpat" method="POST">
        <div class="mb-3">
          <label for="fullName" class="form-label">Full Name</label>
          <input type="text" id="fullName" name="full_name" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="phone" class="form-label">Phone Number</label>
          <input type="tel" id="phone" name="phone" class="form-control" pattern="[0-9]{10}" required>
          <div class="form-text">Enter 10-digit phone number</div>
        </div>

        <div class="mb-3">
          <label for="dob" class="form-label">Date of Birth</label>
          <input type="date" id="dob" name="dob" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="address" class="form-label">Address</label>
          <textarea id="address" name="address" class="form-control" rows="3" required></textarea>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" name="password" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="confirm_password" class="form-label">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
        </div>

        <input type="submit" class="btn btn-custom" name="submit" value="Request For Register">
      </form>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
