{% extends "base.html" %}
{% block title %}Update Profile{% endblock %}

{% block extra_head %}
<style>
  .auth-wrapper {
    display: flex; align-items: center; justify-content: center;
    min-height: calc(100vh - 64px); padding: 40px 24px;
  }
  .auth-card {
    width: 100%; max-width: 500px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); backdrop-filter: blur(16px);
    box-shadow: var(--shadow); padding: 40px;
  }
  .auth-header { text-align: center; margin-bottom: 36px; }
  .auth-icon {
    width: 72px; height: 72px; border-radius: 20px;
    background: rgba(79,142,247,0.15); color: #60a5fa;
    font-size: 1.8rem; display: flex; align-items: center;
    justify-content: center; margin: 0 auto 20px;
  }
  .auth-header h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
  .auth-header p  { color: var(--text-muted); font-size: 0.88rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .input-icon-wrap { position: relative; }
  .input-icon-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem; }
  .input-icon-wrap .form-control { padding-left: 40px; }
  .input-icon-wrap.textarea-wrap i { top: 16px; transform: none; }
  .btn-row { display: flex; gap: 12px; margin-top: 8px; }
  @media (max-width: 520px) { .form-row { grid-template-columns: 1fr; } .btn-row { flex-direction: column; } }
</style>
{% endblock %}

{% block nav_links %}
<a href="/patlogged"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
<a href="/" class="nav-logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon"><i class="fas fa-user-edit"></i></div>
      <h1>Update Profile</h1>
      <p>Keep your patient information up to date</p>
    </div>

    <form action="/update_patient" method="POST">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <div class="input-icon-wrap">
          <i class="fas fa-user"></i>
          <input type="text" name="full_name" class="form-control" value="{{ patient.full_name }}" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date of Birth</label>
          <div class="input-icon-wrap">
            <i class="fas fa-calendar"></i>
            <input type="date" name="dob" class="form-control" value="{{ patient.dob }}" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <div class="input-icon-wrap">
            <i class="fas fa-phone"></i>
            <input type="tel" class="form-control" value="{{ patient.phone_no }}" disabled style="opacity:0.5;">
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Address</label>
        <div class="input-icon-wrap textarea-wrap">
          <i class="fas fa-map-marker-alt"></i>
          <textarea name="address" class="form-control" style="padding-left:40px;" rows="3" required>{{ patient.address }}</textarea>
        </div>
      </div>

      <div class="btn-row">
        <button type="submit" class="btn btn-primary" style="flex:1;">
          <i class="fas fa-save"></i> Save Changes
        </button>
        <a href="/patlogged" class="btn btn-ghost" style="flex:1;">
          <i class="fas fa-arrow-left"></i> Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
