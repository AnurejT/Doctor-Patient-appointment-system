<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hospital Appointment System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>

  #flash-wrapper {
    position: fixed;
    top: 20px;
    left: 0;
    width: 100%;
    z-index: 1050;
    text-align: center;
    pointer-events: none;
  }

  .custom-flash {
    display: inline-block;
    margin: 10px auto;
    padding: 12px 24px;
    border-radius: 6px;
    font-weight: bold;
    color: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    animation: fadeout 4s forwards;
    pointer-events: auto;
  }
  
  .custom-flash.success {
    background-color: #28a745; 
  }
  
  .custom-flash.danger {
    background-color: #dc3545; 
  }
  
  .custom-flash.info {
    background-color: #17a2b8;
  }
  
  @keyframes fadeout {
    0%   { opacity: 1; }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-20px); }
  }

  body, html {
    height: 100%;
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(rgba(255,255,255,0.95), rgba(255,255,255,0.46)),
    url('https://images.pexels.com/photos/40568/medical-appointment-doctor-healthcare-40568.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=1080&w=1920') no-repeat center center/cover;
  }
  
  .navbar {
    background-color: #4169E1;
  }

  .navbar-brand {
    color: #fff;
    font-weight: bold;
    font-size: 1.5rem;
    text-align: center;
    width: 100%;
  }

  .main-section {
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 90vh;
    padding-top: 40px;
  }
  .card-custom {
    border: none;
    border-radius: 16px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    background-color: #ffffff;
  }

  .card-custom:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
  }

  .card-custom h2 {
    color: #4169E1;
    margin-bottom: 20px;
    text-align: center;
  }

  .btn-custom {
    background-color: #4169E1;
    color: white;
    border-radius: 30px;
    padding: 12px 20px;
    font-size: 1rem;
    margin-bottom: 10px;
    width: 100%;
    transition: background-color 0.3s ease;
  }

  .btn-custom:hover {
    background-color: #3657B5;
  }

  .admin-btn-wrapper {
    text-align: center;
    margin-top: 40px;
  }

  .btn-admin {
    background-color: #28a745;
    border-radius: 30px;
    color: white;
    padding: 12px 30px;
    font-size: 1rem;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
  }

  .btn-admin:hover {
    background-color: #1e7e34;
  }

  @media (max-width: 768px) {
    .main-section {
      padding: 20px 0;
    }
    .btn-admin {
      width: 80%;
    }
  }

  </style>
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div id="flash-wrapper">
      {% for category, message in messages %}
        <div class="custom-flash {{ category }}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
  {% endwith %}

  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="#">Hospital Appointment System</a>
    </div>
  </nav>

  <div class="container main-section">
    <div class="row justify-content-center">
      <div class="col-md-5 col-sm-10 mb-4">
        <div class="card card-custom p-4 text-center">
          <h2><i class="fas fa-user-plus me-2"></i>New Users</h2>
          <form action="/regpat" method="get">
            <button type="submit" class="btn btn-custom"><i class="fas fa-user-injured me-2"></i>Register as Patient</button>
          </form>
          <form action="/regdoc" method="get">
            <button type="submit" class="btn btn-custom"><i class="fas fa-user-md me-2"></i>Register as Doctor</button>
          </form>
        </div>
      </div>

      <div class="col-md-5 col-sm-10 mb-4">
        <div class="card card-custom p-4 text-center">
          <h2><i class="fas fa-sign-in-alt me-2"></i>Registered Users</h2>
          <form action="/logpat" method="GET">
            <button type="submit" class="btn btn-custom"><i class="fas fa-user me-2"></i>Login as Patient</button>
          </form>
          <form action="/logdoc" method="GET">
            <button type="submit" class="btn btn-custom"><i class="fas fa-user-md me-2"></i>Login as Doctor</button>
          </form>
        </div>
      </div>
    </div>

    <div class="admin-btn-wrapper">
      <form action="/logadmin" method="GET">
        <button type="submit" class="btn btn-admin"><i class="fas fa-user-shield me-2"></i>Login as Admin</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
