<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Appointment Booking - Home</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            position: relative;
        }

        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.pexels.com/photos/40568/medical-appointment-doctor-healthcare-40568.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=1080&w=1920');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            opacity: 0.6;
        }

        .content-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        h1 {
            text-align: center;
            padding: 20px;
            background-color: rgba(52, 152, 219, 0.9);
            color: white;
            margin: 0;
        }

        .section-box {
            background-color: white;
            border-radius: 12px;
            padding: 40px 20px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .btn-custom {
            background-color: #3498db;
            color: white;
            width: 100%;
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: none;
        }

        .btn-custom:hover {
            background-color: #2980b9;
            color: white;
        }

        @media (max-width: 768px) {
            .section-box {
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Image -->
    <div class="background-image"></div>

    <div class="content-wrapper">
        <h1>Doctor Appointment System</h1>

        <div class="container my-5">
            <div class="row justify-content-center">
                <!-- For New Users -->
                <div class="col-md-6 col-lg-5 section-box me-md-3 mb-4 mb-md-0">
                    <h2 class="text-center">For New Users</h2>
                    <form action="/regpat" method="get">
                        <button type="submit" class="btn btn-custom">Register as Patient</button>
                    </form>
                    <form action="/regdoc" method="get">
                        <button type="submit" class="btn btn-custom">Register as Doctor</button>
                    </form>
                </div>

                <!-- For Registered Users -->
                <div class="col-md-6 col-lg-5 section-box ms-md-3">
                    <h2 class="text-center">For Registered Users</h2>
                    <form action="/logpat" method="GET">
                        <button type="submit" class="btn btn-custom">Login as Patient</button>
                    </form>
                    <form action="/logdoc" method="GET">
                        <button type="submit" class="btn btn-custom">Login as Doctor</button>
                    </form>
                    <form action="/logadmin" method="GET">
                        <button type="submit" class="btn btn-custom">Login as Admin</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
