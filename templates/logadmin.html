{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}

{% block extra_head %}
<style>
  .auth-wrapper {
    display: flex; align-items: center; justify-content: center;
    min-height: calc(100vh - 64px); padding: 40px 24px;
  }
  .auth-card {
    width: 100%; max-width: 420px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); backdrop-filter: blur(16px);
    box-shadow: var(--shadow); padding: 40px;
  }
  .auth-header { text-align: center; margin-bottom: 36px; }
  .auth-icon {
    width: 72px; height: 72px; border-radius: 20px;
    background: rgba(34,197,94,0.12); color: #4ade80;
    font-size: 1.8rem; display: flex; align-items: center;
    justify-content: center; margin: 0 auto 20px;
  }
  .auth-header h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
  .auth-header p  { color: var(--text-muted); font-size: 0.88rem; }
  .auth-footer { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-muted); }
  .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .input-icon-wrap { position: relative; }
  .input-icon-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem; }
  .input-icon-wrap .form-control { padding-left: 40px; }
  .admin-warning {
    display: flex; align-items: center; gap: 10px;
    background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2);
    border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 24px;
    font-size: 0.8rem; color: #fbbf24;
  }
</style>
{% endblock %}

{% block nav_links %}
<a href="/"><i class="fas fa-home"></i> Home</a>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon"><i class="fas fa-user-shield"></i></div>
      <h1>Admin Login</h1>
      <p>Secure access for system administrators</p>
    </div>

    <div class="admin-warning">
      <i class="fas fa-exclamation-triangle"></i>
      Restricted area. Authorized personnel only.
    </div>

    <form action="/logadmin" method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-icon-wrap">
          <i class="fas fa-user-shield"></i>
          <input type="text" id="username" name="username" class="form-control" placeholder="Admin username" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon-wrap">
          <i class="fas fa-key"></i>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="btn btn-success btn-full" style="margin-top:8px;">
        <i class="fas fa-unlock"></i> Access Admin Panel
      </button>
    </form>

    <div class="auth-footer">
      <a href="/"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
  </div>
</div>
{% endblock %}
