{% extends "base.html" %}
{% block title %}Update Doctor Profile{% endblock %}

{% block extra_head %}
<style>
  .auth-wrapper {
    display: flex; align-items: center; justify-content: center;
    min-height: calc(100vh - 64px); padding: 40px 24px;
  }
  .auth-card {
    width: 100%; max-width: 520px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); backdrop-filter: blur(16px);
    box-shadow: var(--shadow); padding: 40px;
  }
  .auth-header { text-align: center; margin-bottom: 36px; }
  .auth-icon {
    width: 72px; height: 72px; border-radius: 20px;
    background: rgba(124,93,232,0.15); color: #a78bfa;
    font-size: 1.8rem; display: flex; align-items: center;
    justify-content: center; margin: 0 auto 20px;
  }
  .auth-header h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
  .auth-header p  { color: var(--text-muted); font-size: 0.88rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .input-icon-wrap { position: relative; }
  .input-icon-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem; }
  .input-icon-wrap .form-control { padding-left: 40px; }
  .input-icon-wrap.textarea-wrap i { top: 16px; transform: none; }
  .btn-row { display: flex; gap: 12px; margin-top: 8px; }
  .btn-doc { background: linear-gradient(135deg,#7c5de8,#a78bfa); color: white; box-shadow: 0 4px 16px rgba(124,93,232,0.35); }
  .btn-doc:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,93,232,0.45); }
  @media (max-width: 520px) { .form-row { grid-template-columns: 1fr; } .btn-row { flex-direction: column; } }
</style>
{% endblock %}

{% block nav_links %}
<a href="/doclogged"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
<a href="/" class="nav-logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon"><i class="fas fa-user-md"></i></div>
      <h1>Update Profile</h1>
      <p>Keep your doctor profile accurate and up to date</p>
    </div>

    <form action="/update_doctor" method="POST">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <div class="input-icon-wrap">
          <i class="fas fa-user-md"></i>
          <input type="text" name="full_name" class="form-control" value="{{ doctor.full_name }}" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <div class="input-icon-wrap">
            <i class="fas fa-phone"></i>
            <input type="tel" name="phone" class="form-control" value="{{ doctor.phone_no }}" pattern="[0-9]{10}" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Date of Birth</label>
          <div class="input-icon-wrap">
            <i class="fas fa-calendar"></i>
            <input type="date" name="dob" class="form-control" value="{{ doctor.dob }}" required>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Specialization</label>
        <div class="input-icon-wrap">
          <i class="fas fa-stethoscope"></i>
          <select name="speciality" class="form-control" required>
            {% set specs = ['Cardiologist','Dermatologist','General Physician','Neurologist','Orthopedic','Pediatrician','Psychiatrist','Radiologist','Surgeon','Urologist','Other'] %}
            {% for spec in specs %}
            <option value="{{ spec }}" {% if doctor.specialization == spec %}selected{% endif %}>{{ spec }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Address</label>
        <div class="input-icon-wrap textarea-wrap">
          <i class="fas fa-map-marker-alt"></i>
          <textarea name="address" class="form-control" style="padding-left:40px;" rows="2" required>{{ doctor.address }}</textarea>
        </div>
      </div>

      <div class="btn-row">
        <button type="submit" class="btn btn-doc" style="flex:1;">
          <i class="fas fa-save"></i> Save Changes
        </button>
        <a href="/doclogged" class="btn btn-ghost" style="flex:1;">
          <i class="fas fa-arrow-left"></i> Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
