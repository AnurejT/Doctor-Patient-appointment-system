<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f8;
            font-family: Arial, sans-serif;
        }

        .form-container {
            max-width: 500px;
            margin: 80px auto;
            padding: 40px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #3498db;
        }

        .btn-custom {
            background-color: #3498db;
            color: white;
        }

        .btn-custom:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <ul>
        {% for message in messages %}
        <li style="color: red;">{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}
    {% endwith %}

    <div class="form-container">
        <h2>Update Doctor Profile</h2>
        <form action="/update_doctor" method="POST">
            <div class="mb-3">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" id="fullName" name="full_name" class="form-control" value = "{{ doctor.full_name }}"required>
            </div>

            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" id="phone" name="phone" class="form-control" pattern="[0-9]{10}" value = "{{ doctor.phone_no }}"required>
                <div class="form-text">Enter 10-digit phone number</div>
            </div>

            <div class="mb-3">
                <label for="dob" class="form-label">Date of Birth</label>
                <input type="date" id="dob" name="dob" class="form-control" value="{{ doctor.dob }}" required>
            </div>

            <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <textarea id="address" name="address" class="form-control" rows="3" required> {{ doctor.address }}</textarea>
            </div>

            <div class="mb-3">
                <label for="speciality">Speciality</label>
                <select name="speciality" id="speciality" class="form-control" required>
                    <option value="">-- Select Speciality --</option>
                    <option value="cardiology" 
                            {% if 'cardiology' in doctor.specialization %} 
                            selected 
                            {% endif %}>
                        Cardiology
                    </option>
                    <option value="dermatology" 
                            {% if 'dermatology' in doctor.specialization %} 
                            selected 
                            {% endif %}>
                        Dermatology
                    </option>
                    <option value="neurology" 
                            {% if 'neurology' in doctor.specialization %} 
                            selected 
                            {% endif %}>
                        Neurology
                    </option>
                    <option value="orthopedic" 
                            {% if 'orthopedic' in doctor.specialization %} 
                            selected 
                            {% endif %}>
                        Orthopedic
                    </option>
                    <option value="pediatrician" 
                            {% if 'pediatrician' in doctor.specialization %} 
                            selected 
                            {% endif %}>
                        Pediatrician
                    </option>
                    <option value="psychiatrist" 
                            {% if 'psychiatrist' in doctor.specialization %} 
                            selected 
                            {% endif %}>
                        Psychiatrist
                    </option>
                </select>
            </div>
            

            <input type="submit" class="btn btn-custom w-100" name="submit" value="Update">
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
