<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Doctor Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        nav {
            background-color: #122e5e;
            padding: 15px 20px;
        }

        .nav-container {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #f0db4f;
        }

        .form-container {
            max-width: 450px; /* Same size as patient form */
            margin: 60px auto;
            padding: 40px;
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .form-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
        }

        h2 {
            text-align: center;
            color: #3657B5;
            font-size: 24px; /* Matched with patient edit page */
            margin-bottom: 30px;
        }

        .form-label {
            font-weight: 600;
            font-size: 14px;
            color: #555;
        }

        .form-control {
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.5);
        }

        .btn-custom {
            background-color: #3498db;
            color: white;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            padding: 12px;
            transition: background-color 0.3s ease;
            width: 100%;
        }

        .btn-custom:hover {
            background-color: #2980b9;
        }

        .flash-message {
            background-color: #f8d7da;
            color: #842029;
            border: 1px solid #f5c2c7;
            padding: 15px;
            border-radius: 5px;
            margin: 20px auto;
            max-width: 600px;
            text-align: center;
        }

        .form-text {
            font-size: 12px;
            margin-top: -10px;
            margin-bottom: 10px;
            color: #666;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <div class="nav-container">
            <a href="/">Home</a>
        </div>
    </nav>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash-message">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="form-container">
        <h2>Edit Your Profile</h2> <!-- Text size now matches patient edit page -->
        <form action="/update_doctor" method="POST">
            <div class="mb-3">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" id="fullName" name="full_name" class="form-control" value="{{ doctor.full_name }}" required>
            </div>

            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" id="phone" name="phone" class="form-control" pattern="[0-9]{10}" value="{{ doctor.phone_no }}" required>
                <div class="form-text">Enter 10-digit phone number</div>
            </div>

            <div class="mb-3">
                <label for="dob" class="form-label">Date of Birth</label>
                <input type="date" id="dob" name="dob" class="form-control" value="{{ doctor.dob }}" required>
            </div>

            <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <textarea id="address" name="address" class="form-control" rows="3" required>{{ doctor.address }}</textarea>
            </div>

            <div class="mb-3">
                <label for="speciality" class="form-label">Speciality</label>
                <select name="speciality" id="speciality" class="form-control" required>
                    <option value="">-- Select Speciality --</option>
                    <option value="cardiology" {% if 'cardiology' in doctor.specialization %}selected{% endif %}>Cardiology</option>
                    <option value="dermatology" {% if 'dermatology' in doctor.specialization %}selected{% endif %}>Dermatology</option>
                    <option value="neurology" {% if 'neurology' in doctor.specialization %}selected{% endif %}>Neurology</option>
                    <option value="orthopedic" {% if 'orthopedic' in doctor.specialization %}selected{% endif %}>Orthopedic</option>
                    <option value="pediatrician" {% if 'pediatrician' in doctor.specialization %}selected{% endif %}>Pediatrician</option>
                    <option value="psychiatrist" {% if 'psychiatrist' in doctor.specialization %}selected{% endif %}>Psychiatrist</option>
                </select>
            </div>

            <input type="submit" class="btn btn-custom mt-3" value="Update">
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
